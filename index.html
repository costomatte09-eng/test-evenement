<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Événements CSE — Test</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* ── RESET & BASE ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f0f0f;
      --surface:  #1a1a1a;
      --border:   #2a2a2a;
      --accent:   #e8572a;
      --accent2:  #f0a500;
      --text:     #f0ede8;
      --muted:    #888;
      --font-title: 'Syne', sans-serif;
      --font-body:  'DM Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      padding: 60px 40px 40px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
    }

    .header-left .label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }

    header h1 {
      font-family: var(--font-title);
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .header-right {
      font-size: 0.8rem;
      color: var(--muted);
      text-align: right;
    }

    /* ── MAIN ── */
    main {
      padding: 60px 40px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ── TITRE DE SECTION ── */
    .section-titre {
      font-family: var(--font-title);
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .section-titre.passe {
      color: var(--muted);
      margin-top: 60px;
    }

    /* ── ÉTAT CHARGEMENT / VIDE ── */
    .etat {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── GRILLE CARTES ── */
    .grille {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 2px;
    }

    /* ── CARTE ── */
    .carte {
      background: var(--surface);
      border: 1px solid var(--border);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color 0.2s;
      animation: fadeUp 0.4s ease both;
    }

    .carte:hover { border-color: var(--accent); }

    .carte.passe {
      opacity: 0.5;
      filter: grayscale(0.4);
    }

    .carte.passe:hover { border-color: var(--muted); opacity: 0.7; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .carte:nth-child(1) { animation-delay: 0.05s; }
    .carte:nth-child(2) { animation-delay: 0.10s; }
    .carte:nth-child(3) { animation-delay: 0.15s; }
    .carte:nth-child(4) { animation-delay: 0.20s; }
    .carte:nth-child(5) { animation-delay: 0.25s; }

    .carte-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
    }

    .carte-image-placeholder {
      width: 100%;
      height: 200px;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }

    .carte-body {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
    }

    .carte-tag {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 2px 8px;
      width: fit-content;
      border: 1px solid var(--accent);
      color: var(--accent);
    }

    .carte-tag.passe {
      border-color: var(--muted);
      color: var(--muted);
    }

    .carte-titre {
      font-family: var(--font-title);
      font-size: 1.15rem;
      font-weight: 700;
      line-height: 1.2;
    }

    .carte-date {
      font-size: 0.8rem;
      color: var(--accent2);
      font-weight: 500;
    }

    .carte-notes {
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.6;
      flex: 1;
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 30px 40px;
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 80px;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      header, main { padding: 40px 20px; }
      .grille { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-left">
      <p class="label">Comité Social et Économique</p>
      <h1>Nos<br>événements</h1>
    </div>
    <div class="header-right">
      Données en temps réel<br>via Airtable
    </div>
  </header>

  <!-- MAIN -->
  <main>

    <!-- SECTION À VENIR -->
    <h2 class="section-titre">Prochains événements</h2>
    <div class="grille" id="liste-avenir">
      <div class="etat">
        <div class="spinner"></div>
        Chargement…
      </div>
    </div>

    <!-- SECTION PASSÉ (cachée si vide) -->
    <h2 class="section-titre passe" id="titre-passe" style="display:none;">Événements passés</h2>
    <div class="grille" id="liste-passe"></div>

  </main>

  <!-- FOOTER -->
  <footer>
    Données synchronisées avec Airtable · Kovama
  </footer>

  <!-- SCRIPT AIRTABLE -->
  <script>
    // ── CONFIG ─────────────────────────────────────────────
    const AT_TOKEN = "TON_NOUVEAU_TOKEN_ICI"
    const AT_BASE  = "app5MSXN8N1750gjd"
    const AT_TABLE = "Table 1"
    // ────────────────────────────────────────────────────────

    const listeAvenir = document.getElementById("liste-avenir")
    const listePasse  = document.getElementById("liste-passe")
    const titrePasse  = document.getElementById("titre-passe")

    const url = `https://api.airtable.com/v0/${AT_BASE}/${encodeURIComponent(AT_TABLE)}?sort[0][field]=Date&sort[0][direction]=asc`

    // ── Fonction qui génère une carte ──────────────────────
    function creerCarte(record, estPasse) {
      const e = record.fields

      const dateObj = e.Date ? new Date(e.Date) : null
      const dateStr = dateObj ? dateObj.toLocaleDateString("fr-FR", {
        weekday: "long", day: "numeric", month: "long", year: "numeric"
      }) : "Date à confirmer"
      const heureStr = dateObj ? dateObj.toLocaleTimeString("fr-FR", {
        hour: "2-digit", minute: "2-digit"
      }) : ""

      const imgUrl = e.Attachments && e.Attachments[0] ? e.Attachments[0].url : null
      const mediaHtml = imgUrl
        ? `<img class="carte-image" src="${imgUrl}" alt="${e.Name || 'Événement'}" loading="lazy">`
        : `<div class="carte-image-placeholder">📅</div>`

      const carte = document.createElement("article")
      carte.className = estPasse ? "carte passe" : "carte"
      carte.innerHTML = `
        ${mediaHtml}
        <div class="carte-body">
          <span class="carte-tag ${estPasse ? 'passe' : ''}">${e.Status || "A venir"}</span>
          <h3 class="carte-titre">${e.Name || "Événement"}</h3>
          <p class="carte-date">📅 ${dateStr}${heureStr ? ' · ' + heureStr : ''}</p>
          ${e.Notes ? `<p class="carte-notes">${e.Notes}</p>` : ""}
        </div>
      `
      return carte
    }

    // ── Fetch Airtable ─────────────────────────────────────
    fetch(url, {
      headers: { Authorization: `Bearer ${AT_TOKEN}` }
    })
    .then(r => {
      if (!r.ok) throw new Error(`Erreur HTTP ${r.status}`)
      return r.json()
    })
    .then(data => {
      const records = data.records || []

      // Trier par status
      const avenir = records.filter(r => r.fields.Status === "A venir")
      const passe  = records.filter(r => r.fields.Status === "Passé")

      // ── Section À venir
      listeAvenir.innerHTML = ""
      if (avenir.length === 0) {
        listeAvenir.innerHTML = `<div class="etat">Aucun événement à venir pour le moment.</div>`
      } else {
        avenir.forEach(r => listeAvenir.appendChild(creerCarte(r, false)))
      }

      // ── Section Passé (affichée uniquement si données)
      if (passe.length > 0) {
        titrePasse.style.display = "block"
        passe.forEach(r => listePasse.appendChild(creerCarte(r, true)))
      }
    })
    .catch(err => {
      listeAvenir.innerHTML = `<div class="etat">❌ Impossible de charger les événements.<br><small style="margin-top:8px;display:block">${err.message}</small></div>`
      console.error("Airtable fetch error:", err)
    })
  </script>

</body>
</html>
